name: A股AI自进化选股雷达

on:
  schedule:
    # 每天北京时间 15:30 左右运行 (UTC 7:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

# 赋予机器人提交代码的写权限
permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    
    # 把 Secrets 映射到环境变量
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install akshare pandas numpy json-repair tushare

      - name: Run Screener
        run: |
          python -m src.screener

      - name: Commit and push AI Memory
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f data/
          git commit -m "Auto-update AI memory and history" || echo "No new lessons to commit"
          git push

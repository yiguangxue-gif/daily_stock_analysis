name: 🚀 A股AI自进化选股雷达

on:
  schedule:
    # 每天北京时间 02:10 运行 (UTC 前一日 18:10)
    - cron: '10 06 * * 1-5'
  workflow_dispatch: # 允许手动点击运行

# 【极其关键】：赋予机器人提交代码的写权限
permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    
    # 映射环境变量，Python 才能读取并发邮件
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}

    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4

    - name: 🐍 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 安装依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install akshare pandas numpy json-repair
    - name: 🎯 运行量化选股雷达
      run: |
        python -m src.screener
    # 👇👇 终极修复：加了 -f 参数，强制无视 gitignore 写入 AI 记忆 👇👇
    - name: 💾 Commit and push AI Memory
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -f data/
        # 如果 data 文件夹没变化，就跳过不报错
        git commit -m "🤖 Auto-update AI memory and history" || echo "No new lessons to commit"
        git push
